# ============================================================
# 多币种网格机器人配置 (币安/Gate 可切, 币种可切)
# 策略: 锚定EMA30中性网格 + 资金费偏置 + 趋势熔断
# 目标: U本位收益 (赚USDT), 不做利润回购
# ============================================================

exchange:
  id: binance                      # binance(主流币+中小币) 或 gate(隐私币如XMR)
  # 币安期货 API key: 开启"允许合约" + "允许读取". 关闭提现. 绑VPS IP白名单.
  api_key: "YOUR_API_KEY"
  api_secret: "YOUR_API_SECRET"
  perp_symbol: "BTC/USDT:USDT"     # 交易对. 可在TG菜单"切换币种"动态改, 或发 /symbol DOGE

mode:
  dry_run: true                    # true=只模拟不下单, 先跑一周再切false
  poll_interval_sec: 10

grid:
  anchor_ema_period: 30            # 锚点: 日线 EMA30
  anchor_timeframe: "1d"
  recenter_interval_hours: 168     # 每周重新锚定
  range_pct: 0.10                  # 网格范围 锚点±10% (BTC波动比XMR小, 范围收窄)
  step_pct: 0.008                  # 格距 0.8% (BTC波动小, 格距比XMR密)
  usdt_per_grid: 50                # 每格名义价值USDT (BTC最小下单量0.001≈100U, 注意见下)
  active_levels_per_side: 5        # 每侧同时挂单数
  leverage: 3                      # 杠杆, 别超5

funding_bias:
  enabled: true
  threshold: 0.0001                # 资金费偏置触发线 (BTC资金费通常较小)
  bias_multiplier: 1.3

circuit_breaker:
  timeframe: "4h"
  consecutive_closes: 3            # 连续3根4h K线收在边界外→熔断
  action_pause_hours: 12

profit_recycle:
  enabled: false                   # U本位: 不回购. 利润以USDT形式留存
  min_usdt_to_buy: 999999
  recycle_fraction: 0.0

risk:
  liq_distance_warn_pct: 0.30
  liq_distance_reduce_pct: 0.20
  max_net_position_usdt: 2000      # 净敞口上限
  daily_loss_limit_usdt: 200       # 当日亏损kill switch

telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"
  report_interval_hours: 24

web:
  enabled: true
  host: "0.0.0.0"                  # 只读面板, 公网访问. 用长token保护
  port: 8787
  token: "CHANGE_ME_LONG_RANDOM"   # openssl rand -hex 24 生成

storage:
  db_path: "data/bot.db"
  log_path: "data/bot.log"
