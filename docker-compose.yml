services:
  # 实盘容器 (跑一个币, 真实下单)
  grid-bot:
    build: .
    image: grid-bot:local
    container_name: grid-bot
    restart: unless-stopped
    command: ["python", "main.py", "live", "--config", "config.local.yaml"]
    ports:
      - "8787:8787"               # 实盘只读面板
    volumes:
      - ./config.local.yaml:/app/config.local.yaml
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai

  # 模拟对比容器 (并行跑多个币, 不下单, 帮你选币)
  grid-multisim:
    build: .
    image: grid-bot:local
    container_name: grid-multisim
    restart: unless-stopped
    command: ["python", "main.py", "multisim", "--config", "config.local.yaml"]
    ports:
      - "8788:8788"               # 多币对比面板
    volumes:
      - ./config.local.yaml:/app/config.local.yaml
      - ./data-sim:/app/data      # 模拟盘数据单独目录, 不和实盘混
    environment:
      - TZ=Asia/Shanghai
